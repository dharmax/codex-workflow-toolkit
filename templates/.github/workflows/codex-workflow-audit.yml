name: Codex Workflow Audit

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  workflow-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/codex-workflow/workflow-audit.mjs
